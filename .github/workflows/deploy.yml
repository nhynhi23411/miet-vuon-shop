name: Deploy lên GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # cho phép chạy thủ công từ tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 lần deploy tại 1 thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài thư viện
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tạo 404.html (SPA fallback cho React Router)
        run: cp dist/index.html dist/404.html

      - name: Tải artifact lên Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
